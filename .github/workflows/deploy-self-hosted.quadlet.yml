# # Exécuter à distance ce workflow:
# curl -s -o /dev/null -w "dispatch HTTP %{http_code}\n" -X POST \
#   -H "Accept: application/vnd.github+json" \
#   -H "Authorization: Bearer $GITHUB_TOKEN" \
#   https://api.github.com/repos/nc98-ai/vllm-qwen/actions/workflows/deploy-self-hosted.quadlet.yml/dispatches \
#   -d '{"ref":"main","inputs":{"target_env":"ENV_PRD-OPTNC"}}'

name: Deploy (Self-Hosted) avec Quadlet Systemd

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Environnement GitHub contenant les secrets de deploiement"
        required: true
        default: ENV_DEV-OPTNC
        type: choice
        options:
          - ENV_DEV-OPTNC
          - ENV_QUL-OPTNC          
          - ENV_PRD-OPTNC
      network_name:
        description: Override the Docker network name (optional)
        required: false
        default: ""

jobs:
  deploy:
    runs-on: self-hosted
    environment: ${{ inputs.target_env || github.ref_name }}
    steps:
      - name: Force XDG_RUNTIME_DIR
        shell: bash
        run: |
          echo "XDG_RUNTIME_DIR=/run/user/$(id -u)" >> "$GITHUB_ENV"
          echo "DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus" >> "$GITHUB_ENV"

      - name: Resolve deployment names
        shell: bash
        env:
          TARGET_ENV: ${{ inputs.target_env || github.ref_name }}
          ENV_NAME_VAR: ${{ vars.ENV_NAME }}
          MODEL_NAME_VAR: ${{ vars.MODEL_NAME }}
          MAX_MODEL_LEN_VAR: ${{ vars.MAX_MODEL_LEN }}
          GPU_MEMORY_UTILIZATION_VAR: ${{ vars.GPU_MEMORY_UTILIZATION }}
          NGINX_HTTPS_HOST_PORT_VAR: ${{ vars.NGINX_HTTPS_HOST_PORT }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -Eeuo pipefail

          if [ -n "${ENV_NAME_VAR:-}" ]; then
            deploy_env_name="${ENV_NAME_VAR}"
          else
            deploy_env_name="${TARGET_ENV}"
          fi

          if [ -z "$(printf '%s' "${deploy_env_name}" | tr -d '[:space:]')" ]; then
            echo "Missing required environment variable: ENV_NAME." >&2
            exit 1
          fi

          if [ -z "$(printf '%s' "${GPU_MEMORY_UTILIZATION_VAR:-}" | tr -d '[:space:]')" ]; then
            echo "Missing required environment variable: GPU_MEMORY_UTILIZATION." >&2
            exit 1
          fi

          if [ -z "$(printf '%s' "${MODEL_NAME_VAR:-}" | tr -d '[:space:]')" ]; then
            echo "Missing required environment variable: MODEL_NAME." >&2
            exit 1
          fi

          if [ -z "$(printf '%s' "${MAX_MODEL_LEN_VAR:-}" | tr -d '[:space:]')" ]; then
            echo "Missing required environment variable: MAX_MODEL_LEN." >&2
            exit 1
          fi

          if [ -z "$(printf '%s' "${NGINX_HTTPS_HOST_PORT_VAR:-}" | tr -d '[:space:]')" ]; then
            echo "Missing required environment variable: NGINX_HTTPS_HOST_PORT." >&2
            exit 1
          fi

          echo "DEPLOY_ENV_NAME=${deploy_env_name}" >> "$GITHUB_ENV"
          echo "DEPLOY_STACK_DIR=${REPO_NAME}-${deploy_env_name}" >> "$GITHUB_ENV"
          echo "MODEL_NAME=${MODEL_NAME_VAR}" >> "$GITHUB_ENV"
          echo "MAX_MODEL_LEN=${MAX_MODEL_LEN_VAR}" >> "$GITHUB_ENV"
          echo "GPU_MEMORY_UTILIZATION=${GPU_MEMORY_UTILIZATION_VAR}" >> "$GITHUB_ENV"
          echo "NGINX_HTTPS_HOST_PORT=${NGINX_HTTPS_HOST_PORT_VAR}" >> "$GITHUB_ENV"

      - name: Resolve persistent deploy directories
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "DEPLOY_CONTENT_DIR=${HOME}/SELFHOSTEDRUNNERS/${DEPLOY_STACK_DIR}" >> "$GITHUB_ENV"
          echo "RUNTIME_DIR=${HOME}/SELFHOSTEDRUNNERS/${DEPLOY_STACK_DIR}/runtime" >> "$GITHUB_ENV"
          echo "HF_CACHE_DIR=${HOME}/SELFHOSTEDRUNNERS/${DEPLOY_STACK_DIR}/huggingface-cache" >> "$GITHUB_ENV"

      - name: Log runner user context
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "RUNNER_USER=${USER:-<unset>}"
          echo "RUNNER_WHOAMI=$(whoami)"
          echo "RUNNER_UID=$(id -u)"
          echo "RUNNER_GID=$(id -g)"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image references
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "NGINX_IMAGE=nginx-vllm-qwen:local" >> "$GITHUB_ENV"

      - name: Prepare persistent deploy content
        shell: bash
        run: |
          set -Eeuo pipefail

          managed_dirs=(
            "$DEPLOY_CONTENT_DIR"
            "$RUNTIME_DIR"
            "$RUNTIME_DIR/secrets"
            "$HF_CACHE_DIR"
          )

          mkdir -p "${managed_dirs[@]}"
          chmod 700 "$DEPLOY_CONTENT_DIR" "$RUNTIME_DIR" "$RUNTIME_DIR/secrets" "$HF_CACHE_DIR"

      - name: Prepare secrets files
        env:
          NGINX_SSL_CERT: ${{ secrets.NGINX_SSL_CERT }}
          NGINX_SSL_CERT_B64: ${{ secrets.NGINX_SSL_CERT_B64 }}
          NGINX_SSL_KEY: ${{ secrets.NGINX_SSL_KEY }}
          NGINX_SSL_KEY_B64: ${{ secrets.NGINX_SSL_KEY_B64 }}
          NGINX_SSL_FULLCHAIN: ${{ secrets.NGINX_SSL_FULLCHAIN }}
          NGINX_SSL_FULLCHAIN_B64: ${{ secrets.NGINX_SSL_FULLCHAIN_B64 }}
          VLLM_API_KEY: ${{ secrets.VLLM_API_KEY }}
        run: |
          set -euo pipefail

          secrets_dir="${RUNTIME_DIR}/secrets"
          mkdir -p "${secrets_dir}" "${RUNTIME_DIR}"
          umask 077

          if [ -z "${VLLM_API_KEY:-}" ]; then
            echo "Missing required secret: VLLM_API_KEY" >&2
            exit 1
          fi

          if [ -n "${VLLM_API_KEY:-}" ]; then
            printf '%s' "${VLLM_API_KEY}" > "${RUNTIME_DIR}/vllm_api_key.txt"
          fi

          if [ -n "${NGINX_SSL_KEY_B64:-}" ]; then
            printf '%s' "${NGINX_SSL_KEY_B64}" | base64 -d > "${secrets_dir}/NGINX_SSL_KEY"
          elif [ -n "${NGINX_SSL_KEY:-}" ]; then
            printf '%s' "${NGINX_SSL_KEY}" > "${secrets_dir}/NGINX_SSL_KEY"
          fi
          
          if [ -f "${secrets_dir}/NGINX_SSL_KEY" ]; then
            chmod 600 "${secrets_dir}/NGINX_SSL_KEY"
          fi

          if [ -n "${NGINX_SSL_CERT_B64:-}" ]; then
            printf '%s' "${NGINX_SSL_CERT_B64}" | base64 -d > "${secrets_dir}/NGINX_SSL_CERT"
          elif [ -n "${NGINX_SSL_CERT:-}" ]; then
            printf '%s' "${NGINX_SSL_CERT}" > "${secrets_dir}/NGINX_SSL_CERT"
          fi
          
          if [ -f "${secrets_dir}/NGINX_SSL_CERT" ]; then
            chmod 644 "${secrets_dir}/NGINX_SSL_CERT"
          fi

          if [ -n "${NGINX_SSL_FULLCHAIN_B64:-}" ]; then
            printf '%s' "${NGINX_SSL_FULLCHAIN_B64}" | base64 -d > "${secrets_dir}/NGINX_SSL_FULLCHAIN"
          elif [ -n "${NGINX_SSL_FULLCHAIN:-}" ]; then
            printf '%s' "${NGINX_SSL_FULLCHAIN}" > "${secrets_dir}/NGINX_SSL_FULLCHAIN"
          fi
          
          if [ -f "${secrets_dir}/NGINX_SSL_FULLCHAIN" ]; then
            chmod 644 "${secrets_dir}/NGINX_SSL_FULLCHAIN"
          fi

          find "${RUNTIME_DIR}" -type f -exec chmod 600 {} +

      - name: Build nginx image locally
        shell: bash
        run: |
          set -Eeuo pipefail
          podman build -f docker/nginx/Dockerfile -t "$NGINX_IMAGE" .

      - name: Deploy with Systemd (Podman Quadlet)
        env:
          ENV_NAME: ${{ env.DEPLOY_ENV_NAME }}
          MODEL_NAME: ${{ env.MODEL_NAME }}
          MAX_MODEL_LEN: ${{ env.MAX_MODEL_LEN }}
          GPU_MEMORY_UTILIZATION: ${{ env.GPU_MEMORY_UTILIZATION }}
          NGINX_HTTPS_HOST_PORT: ${{ env.NGINX_HTTPS_HOST_PORT }}
          NGINX_IMAGE: ${{ env.NGINX_IMAGE }}
          RUNTIME_DIR: ${{ env.RUNTIME_DIR }}
          HF_CACHE_DIR: ${{ env.HF_CACHE_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          
          # 1. Vérification de la version (Doit être >= 4.4)
          echo "--- PODMAN VERSION ---"
          podman --version
          
          # 2. Préparation du répertoire
          QUADLET_DIR="$HOME/.config/containers/systemd"
          mkdir -p "$QUADLET_DIR"
          rm -f "$QUADLET_DIR"/* # Nettoyage pour éviter les conflits
          
          # 3. Génération des fichiers à partir des templates
          envsubst < docker/quadlets/vllm-qwen.network.template > "$QUADLET_DIR/vllm-qwen.network"
          envsubst < docker/quadlets/vllm-qwen.container.template > "$QUADLET_DIR/vllm-qwen.container"
          envsubst < docker/quadlets/nginx-vllm.container.template > "$QUADLET_DIR/nginx-vllm.container"
          
          # 4. Debug : Vérifier le contenu généré (pour voir si les sauts de ligne sont bons)
          echo "--- DEBUG: CONTENT OF VLLM CONTAINER ---"
          cat "$QUADLET_DIR/vllm-qwen.container"
          
          # 5. Rechargement de Systemd
          systemctl --user daemon-reload
          
          # 6. Debug : Lister les unités générées par Podman
          echo "--- DEBUG: GENERATED UNITS ---"
          systemctl --user list-unit-files | grep -E "vllm|nginx" || echo "Aucune unité trouvée"

          # 7. Activation et démarrage
          # Note : Si Podman < 4.4, cette étape échouera car Quadlet n'est pas supporté.
          systemctl --user enable --now vllm-qwen.service
          systemctl --user enable --now nginx-vllm.service
          systemctl --user restart vllm-qwen.service nginx-vllm.service

          
      - name: Post-deploy port diagnostics
        env:
          DEPLOY_ENV_NAME: ${{ env.DEPLOY_ENV_NAME }}
          NGINX_HTTPS_HOST_PORT: ${{ env.NGINX_HTTPS_HOST_PORT }}
          VLLM_API_KEY: ${{ secrets.VLLM_API_KEY }}
        shell: bash
        run: |
          set -Eeuo pipefail
          nginx_container="nginx-vllm-qwen-${DEPLOY_ENV_NAME}"
          vllm_container="vllm_qwen-${DEPLOY_ENV_NAME}"

          echo "NGINX_HTTPS_HOST_PORT=${NGINX_HTTPS_HOST_PORT}"
          podman ps --format "table {{.Names}}\t{{.Ports}}" | sed -n '1,5p'
          podman port "${nginx_container}" || true
          ss -tnlp || true

          ok=0
          for _ in $(seq 1 300); do
            if curl -fsS --http1.1 -k "https://127.0.0.1:${NGINX_HTTPS_HOST_PORT}/v1/models" \
              -H "Authorization: Bearer ${VLLM_API_KEY}" >/dev/null; then
              ok=1
              break
            fi
            sleep 2
          done

          if [ "${ok}" -ne 1 ]; then
            echo "Post-deploy check failed after retries. Dumping container logs..." >&2
            echo "--- LOGS VLLM ---"
            journalctl --user -u vllm-qwen.service --no-pager --tail 150 || true
            echo "--- LOGS NGINX ---"
            journalctl --user -u nginx-vllm.service --no-pager --tail 150 || true
            exit 1
          fi