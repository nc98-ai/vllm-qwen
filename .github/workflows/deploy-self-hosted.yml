name: Deploy (Self-Hosted) avec Compose

env:
  COMPOSE_FILE_PATH: docker/docker-compose-vllm-nginx.yml

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Environnement GitHub contenant les secrets de deploiement"
        required: true
        default: ENV_DEV-OPTNC
        type: choice
        options:
          - ENV_DEV-OPTNC
      network_name:
        description: Override the Docker network name (optional)
        required: false
        default: ""

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - docker
    environment: ${{ inputs.target_env || github.ref_name }}
    steps:
      - name: Resolve deployment names
        shell: bash
        env:
          TARGET_ENV: ${{ inputs.target_env || github.ref_name }}
          ENV_NAME_VAR: ${{ vars.ENV_NAME }}
          MODEL_NAME_VAR: ${{ vars.MODEL_NAME }}
          MODEL_REVISION_VAR: ${{ vars.MODEL_REVISION }}
          MAX_MODEL_LEN_VAR: ${{ vars.MAX_MODEL_LEN }}
          GPU_MEMORY_UTILIZATION_VAR: ${{ vars.GPU_MEMORY_UTILIZATION }}
          NGINX_HTTPS_LISTEN_PORT_VAR: ${{ vars.NGINX_HTTPS_LISTEN_PORT }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -Eeuo pipefail

          if [ -n "${ENV_NAME_VAR:-}" ]; then
            deploy_env_name="${ENV_NAME_VAR}"
          else
            deploy_env_name="${TARGET_ENV}"
          fi

          if [ -z "$(printf '%s' "${deploy_env_name}" | tr -d '[:space:]')" ]; then
            echo "Missing required environment variable: ENV_NAME. Define vars.ENV_NAME in the selected GitHub environment (${TARGET_ENV})." >&2
            exit 1
          fi

          if [ -z "$(printf '%s' "${GPU_MEMORY_UTILIZATION_VAR:-}" | tr -d '[:space:]')" ]; then
            echo "Missing required environment variable: GPU_MEMORY_UTILIZATION. Define vars.GPU_MEMORY_UTILIZATION in the selected GitHub environment (${TARGET_ENV})." >&2
            exit 1
          fi

          if [ -z "$(printf '%s' "${MODEL_NAME_VAR:-}" | tr -d '[:space:]')" ]; then
            echo "Missing required environment variable: MODEL_NAME. Define vars.MODEL_NAME in the selected GitHub environment (${TARGET_ENV})." >&2
            exit 1
          fi

          if [ -z "$(printf '%s' "${MODEL_REVISION_VAR:-}" | tr -d '[:space:]')" ]; then
            echo "Missing required environment variable: MODEL_REVISION. Define vars.MODEL_REVISION in the selected GitHub environment (${TARGET_ENV})." >&2
            exit 1
          fi

          if [ -z "$(printf '%s' "${MAX_MODEL_LEN_VAR:-}" | tr -d '[:space:]')" ]; then
            echo "Missing required environment variable: MAX_MODEL_LEN. Define vars.MAX_MODEL_LEN in the selected GitHub environment (${TARGET_ENV})." >&2
            exit 1
          fi

          if [ -z "$(printf '%s' "${NGINX_HTTPS_LISTEN_PORT_VAR:-}" | tr -d '[:space:]')" ]; then
            echo "Missing required environment variable: NGINX_HTTPS_LISTEN_PORT. Define vars.NGINX_HTTPS_LISTEN_PORT in the selected GitHub environment (${TARGET_ENV})." >&2
            exit 1
          fi

          echo "DEPLOY_ENV_NAME=${deploy_env_name}" >> "$GITHUB_ENV"
          echo "DEPLOY_STACK_DIR=${REPO_NAME}-${deploy_env_name}" >> "$GITHUB_ENV"
          echo "MODEL_NAME=${MODEL_NAME_VAR}" >> "$GITHUB_ENV"
          echo "MODEL_REVISION=${MODEL_REVISION_VAR}" >> "$GITHUB_ENV"
          echo "MAX_MODEL_LEN=${MAX_MODEL_LEN_VAR}" >> "$GITHUB_ENV"
          echo "GPU_MEMORY_UTILIZATION=${GPU_MEMORY_UTILIZATION_VAR}" >> "$GITHUB_ENV"
          echo "NGINX_HTTPS_LISTEN_PORT=${NGINX_HTTPS_LISTEN_PORT_VAR}" >> "$GITHUB_ENV"

      - name: Resolve persistent deploy directories
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "DEPLOY_CONTENT_DIR=${HOME}/SELFHOSTEDRUNNERS/${DEPLOY_STACK_DIR}" >> "$GITHUB_ENV"
          echo "RUNTIME_DIR=${HOME}/SELFHOSTEDRUNNERS/${DEPLOY_STACK_DIR}/runtime" >> "$GITHUB_ENV"
          echo "COMPOSE_OVERRIDE_PATH=${HOME}/SELFHOSTEDRUNNERS/${DEPLOY_STACK_DIR}/docker-compose.selfhosted.vllm.override.yml" >> "$GITHUB_ENV"
          echo "HF_CACHE_DIR=${HOME}/SELFHOSTEDRUNNERS/${DEPLOY_STACK_DIR}/huggingface-cache" >> "$GITHUB_ENV"

      - name: Log runner user context
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "RUNNER_USER=${USER:-<unset>}"
          echo "RUNNER_WHOAMI=$(whoami)"
          echo "RUNNER_UID=$(id -u)"
          echo "RUNNER_GID=$(id -g)"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Docker CLI
        shell: bash
        run: |
          set -Eeuo pipefail

          docker_bin="$(command -v docker || true)"
          if [ -z "${docker_bin}" ]; then
            echo "Docker CLI not found on this self-hosted runner." >&2
            exit 1
          fi

          echo "DOCKER_BIN=${docker_bin}" >> "$GITHUB_ENV"

      - name: Verify native Docker engine
        shell: bash
        run: |
          set -Eeuo pipefail

          docker_version="$("$DOCKER_BIN" --version 2>&1 || true)"
          compose_version="$("$DOCKER_BIN" compose version 2>&1 || true)"
          docker_info="$("$DOCKER_BIN" info --format '{{.ServerVersion}} {{.OperatingSystem}} {{.Name}}' 2>&1 || true)"

          printf 'docker --version: %s\n' "${docker_version}"
          printf 'docker compose version: %s\n' "${compose_version}"
          printf 'docker info: %s\n' "${docker_info}"

          combined_output="$(printf '%s\n%s\n%s\n' "${docker_version}" "${compose_version}" "${docker_info}")"
          if printf '%s' "${combined_output}" | grep -Eiq 'podman|emulate docker cli|podman-compose|rootlessport'; then
            echo "This runner resolves docker commands to Podman emulation instead of a native Docker engine." >&2
            echo "Install and expose a real Docker daemon/CLI for the runner, or update the runner configuration so docker no longer points to Podman." >&2
            exit 1
          fi

      - name: Resolve image references
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "NGINX_IMAGE=nginx-vllm-qwen:local" >> "$GITHUB_ENV"

      - name: Prepare persistent deploy content
        shell: bash
        run: |
          set -Eeuo pipefail

          managed_dirs=(
            "$DEPLOY_CONTENT_DIR"
            "$RUNTIME_DIR"
            "$RUNTIME_DIR/secrets"
            "$HF_CACHE_DIR"
          )

          mkdir -p "${managed_dirs[@]}"
          chmod 700 "$DEPLOY_CONTENT_DIR" "$RUNTIME_DIR" "$RUNTIME_DIR/secrets" "$HF_CACHE_DIR"

      - name: Prepare secrets files
        env:
          NGINX_SSL_CERT: ${{ secrets.NGINX_SSL_CERT }}
          NGINX_SSL_CERT_B64: ${{ secrets.NGINX_SSL_CERT_B64 }}
          NGINX_SSL_KEY: ${{ secrets.NGINX_SSL_KEY }}
          NGINX_SSL_KEY_B64: ${{ secrets.NGINX_SSL_KEY_B64 }}
          NGINX_SSL_FULLCHAIN: ${{ secrets.NGINX_SSL_FULLCHAIN }}
          NGINX_SSL_FULLCHAIN_B64: ${{ secrets.NGINX_SSL_FULLCHAIN_B64 }}
          VLLM_API_KEY: ${{ secrets.VLLM_API_KEY }}
        run: |
          set -euo pipefail

          secrets_dir="${RUNTIME_DIR}/secrets"
          mkdir -p "${secrets_dir}" "${RUNTIME_DIR}"
          umask 077

          if [ -z "${VLLM_API_KEY:-}" ]; then
            echo "Missing required secret: VLLM_API_KEY" >&2
            exit 1
          fi

          if [ -n "${VLLM_API_KEY:-}" ]; then
            printf '%s' "${VLLM_API_KEY}" > "${RUNTIME_DIR}/vllm_api_key.txt"
          fi

          if [ -n "${NGINX_SSL_KEY_B64:-}" ]; then
            printf '%s' "${NGINX_SSL_KEY_B64}" | base64 -d > "${secrets_dir}/NGINX_SSL_KEY"
          elif [ -n "${NGINX_SSL_KEY:-}" ]; then
            printf '%s' "${NGINX_SSL_KEY}" > "${secrets_dir}/NGINX_SSL_KEY"
          fi
          if [ -f "${secrets_dir}/NGINX_SSL_KEY" ]; then
            chmod 600 "${secrets_dir}/NGINX_SSL_KEY"
          fi

          if [ -n "${NGINX_SSL_CERT_B64:-}" ]; then
            printf '%s' "${NGINX_SSL_CERT_B64}" | base64 -d > "${secrets_dir}/NGINX_SSL_CERT"
          elif [ -n "${NGINX_SSL_CERT:-}" ]; then
            printf '%s' "${NGINX_SSL_CERT}" > "${secrets_dir}/NGINX_SSL_CERT"
          fi
          if [ -f "${secrets_dir}/NGINX_SSL_CERT" ]; then
            chmod 644 "${secrets_dir}/NGINX_SSL_CERT"
          fi

          if [ -n "${NGINX_SSL_FULLCHAIN_B64:-}" ]; then
            printf '%s' "${NGINX_SSL_FULLCHAIN_B64}" | base64 -d > "${secrets_dir}/NGINX_SSL_FULLCHAIN"
          elif [ -n "${NGINX_SSL_FULLCHAIN:-}" ]; then
            printf '%s' "${NGINX_SSL_FULLCHAIN}" > "${secrets_dir}/NGINX_SSL_FULLCHAIN"
          fi
          if [ -f "${secrets_dir}/NGINX_SSL_FULLCHAIN" ]; then
            chmod 644 "${secrets_dir}/NGINX_SSL_FULLCHAIN"
          fi

          find "${RUNTIME_DIR}" -type f -exec chmod 600 {} +

      - name: Generate compose override for self-hosted runtime
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "${RUNTIME_DIR}"
          {
            printf '%s\n' 'services:'
            printf '%s\n' '  vllm:'
            printf '%s\n' '    volumes:'
            printf '%s\n' "      - ${HF_CACHE_DIR}:/root/.cache/huggingface"
            printf '%s\n' '  nginx:'
            printf '%s\n' "    image: ${NGINX_IMAGE}"
            printf '%s\n' 'secrets:'
            printf '%s\n' '  NGINX_SSL_CERT:'
            printf '%s\n' "    file: ${RUNTIME_DIR}/secrets/NGINX_SSL_CERT"
            printf '%s\n' '  NGINX_SSL_KEY:'
            printf '%s\n' "    file: ${RUNTIME_DIR}/secrets/NGINX_SSL_KEY"
            printf '%s\n' '  NGINX_SSL_FULLCHAIN:'
            printf '%s\n' "    file: ${RUNTIME_DIR}/secrets/NGINX_SSL_FULLCHAIN"
            printf '%s\n' '  vllm_api_key:'
            printf '%s\n' "    file: ${RUNTIME_DIR}/vllm_api_key.txt"
          } > "${COMPOSE_OVERRIDE_PATH}"

      - name: Validate compose definition
        shell: bash
        run: |
          set -Eeuo pipefail
          "$DOCKER_BIN" compose \
            -f "$COMPOSE_FILE_PATH" \
            -f "$COMPOSE_OVERRIDE_PATH" \
            config -q

      - name: Build nginx image locally
        shell: bash
        run: |
          set -Eeuo pipefail
          "$DOCKER_BIN" build -f docker/nginx/Dockerfile -t "$NGINX_IMAGE" .

      - name: Remove only current deployment containers
        env:
          ENV_NAME: ${{ env.DEPLOY_ENV_NAME }}
        shell: bash
        run: |
          set -Eeuo pipefail

          containers=(
            "nginx-vllm-qwen-${ENV_NAME}"
            "vllm_qwen-${ENV_NAME}"
          )

          for container in "${containers[@]}"; do
            if "$DOCKER_BIN" container inspect "$container" >/dev/null 2>&1; then
              "$DOCKER_BIN" rm -f "$container"
            fi
          done

      - name: Check HTTPS host port availability
        env:
          NGINX_HTTPS_LISTEN_PORT: ${{ env.NGINX_HTTPS_LISTEN_PORT }}
        shell: bash
        run: |
          set -Eeuo pipefail

          if ss -H -ltn "sport = :${NGINX_HTTPS_LISTEN_PORT}" | grep -q .; then
            echo "Host TCP port ${NGINX_HTTPS_LISTEN_PORT} is already in use on this runner." >&2
            echo "Choose a different vars.NGINX_HTTPS_LISTEN_PORT for this GitHub environment or stop the process currently listening on that port before redeploying." >&2
            echo "Current listeners:" >&2
            ss -H -ltnp "sport = :${NGINX_HTTPS_LISTEN_PORT}" >&2 || true
            exit 1
          fi

      - name: Deploy with Docker Compose
        env:
          ENV_NAME: ${{ env.DEPLOY_ENV_NAME }}
          MODEL_NAME: ${{ env.MODEL_NAME }}
          MODEL_REVISION: ${{ env.MODEL_REVISION }}
          MAX_MODEL_LEN: ${{ env.MAX_MODEL_LEN }}
          GPU_MEMORY_UTILIZATION: ${{ env.GPU_MEMORY_UTILIZATION }}
          NGINX_HTTPS_LISTEN_PORT: ${{ env.NGINX_HTTPS_LISTEN_PORT }}
          NETWORK_NAME: ${{ inputs.network_name }}
        run: |
          set -euo pipefail
          "$DOCKER_BIN" compose \
            -f "$COMPOSE_FILE_PATH" \
            -f "$COMPOSE_OVERRIDE_PATH" \
            up -d --no-build --force-recreate
