services:

  nginx:
    build:
      context: ../
      dockerfile: docker/nginx/Dockerfile
    image: nginx:latest
    container_name: nginx-vllm-qwen-${ENV_NAME:-dev}
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_healthy
    networks:
      - app-network
    ports:
      - "${NGINX_HTTPS_LISTEN_PORT:-443}:443"
    environment:
      TZ: Pacific/Noumea
      NGINX_BACKEND_UPSTREAM: ${NGINX_BACKEND_UPSTREAM:-vllm:8000}
      NGINX_HTTPS_LISTEN_PORT: ${NGINX_CONTAINER_HTTPS_LISTEN_PORT:-443}
      NGINX_BACKEND_WARMUP_ENABLED: ${NGINX_BACKEND_WARMUP_ENABLED:-true}
      NGINX_BACKEND_WARMUP_PROMPT: ${NGINX_BACKEND_WARMUP_PROMPT:-warmup}
      NGINX_BACKEND_WARMUP_MAX_TOKENS: ${NGINX_BACKEND_WARMUP_MAX_TOKENS:-1}
      NGINX_BACKEND_WARMUP_TIMEOUT: ${NGINX_BACKEND_WARMUP_TIMEOUT:-120}
    secrets:
      - NGINX_SSL_CERT
      - NGINX_SSL_KEY
      - NGINX_SSL_FULLCHAIN
      - vllm_api_key
    cpus: 1.0
    mem_limit: 512m

  vllm:
    # Utilisation de l'image pré-construite que vous avez choisie
    image: vllm/vllm-openai:v0.18.0-cu130
    container_name: vllm_qwen-${ENV_NAME:-dev}
    networks:
      - app-network
    secrets:
      - vllm_api_key
    environment:
      - VLLM_API_KEY_FILE=/run/secrets/vllm_api_key

    # Commande pour démarrer le serveur vLLM
    command:
      # - "Qwen/Qwen3-4B-FP8"

      # - "Qwen/Qwen2.5-3B-Instruct-AWQ"

      # - "Qwen/Qwen3.5-4B"
      # - "--language-model-only"     
      
      - "${MODEL_NAME}"
      - "--revision"
      - "${MODEL_REVISION}"
      - "--tokenizer-revision"
      - "${MODEL_REVISION}"
      - "--language-model-only"       
      
      # - "--kv-cache-memory-bytes"
      # - "${KV_CACHE_MEMORY_BYTES}"
      - --"gpu-memory-utilization"
       - "${GPU_MEMORY_UTILIZATION}"
      - "--max-model-len"
      - "${MAX_MODEL_LEN}"
      - "--kv-cache-dtype"
      - "fp8"
      - "--default-chat-template-kwargs"
      - '{"enable_thinking": false}'
      # - "--quantization"
      # - "fp8"

    # Mappage du port pour l'accès à l'API
    expose:
      - "8000"

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS http://127.0.0.1:8000/v1/models >/dev/null
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 10m
      
    # Volume pour la persistance du cache Hugging Face
    volumes:
      - ./huggingface-cache:/root/.cache/huggingface
      
    # Configuration pour l'accès aux GPUs NVIDIA
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

secrets:
  NGINX_SSL_CERT:
    file: ../secrets/NGINX_SSL_CERT
  NGINX_SSL_KEY:
    file: ../secrets/NGINX_SSL_KEY
  NGINX_SSL_FULLCHAIN:
    file: ../secrets/NGINX_SSL_FULLCHAIN
  vllm_api_key:
    file: ./vllm_api_key.txt    

networks:
  app-network:
    name: vllm-qwen-network-${ENV_NAME:-dev}
