services:

  nginx:
    build:
      context: ../
      dockerfile: docker/nginx/Dockerfile
    image: nginx:latest
    container_name: nginx-vllm-qwen-${ENV_NAME:-dev}
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_healthy
    networks:
      - app-network
    ports:
      - "${NGINX_HTTP_LISTEN_PORT:-80}:${NGINX_HTTP_LISTEN_PORT:-80}"
      - "${NGINX_HTTPS_LISTEN_PORT:-443}:${NGINX_HTTPS_LISTEN_PORT:-44444}"
    environment:
      TZ: Pacific/Noumea
      NGINX_BACKEND_UPSTREAM: ${NGINX_BACKEND_UPSTREAM:-vllm:8000}
      NGINX_HTTP_LISTEN_PORT: ${NGINX_HTTP_LISTEN_PORT:-80}
      NGINX_HTTPS_LISTEN_PORT: ${NGINX_HTTPS_LISTEN_PORT:-443}
    secrets:
      - NGINX_SSL_CERT
      - NGINX_SSL_KEY
      - NGINX_SSL_FULLCHAIN
    cpus: 1.0
    mem_limit: 512m

  vllm:
    # Utilisation de l'image pré-construite que vous avez choisie
    image: vllm/vllm-openai:v0.18.0-cu130
    container_name: vllm_qwen-${ENV_NAME:-dev}
    networks:
      - app-network
    secrets:
      - vllm_api_key
    environment:
      - VLLM_API_KEY_FILE=/run/secrets/vllm_api_key

    # Commande pour démarrer le serveur vLLM
    command:
      # - "Qwen/Qwen3-4B-FP8"

      # - "Qwen/Qwen2.5-3B-Instruct-AWQ"

      # - "Qwen/Qwen3.5-4B"
      # - "--language-model-only"     
      
      - "Qwen/Qwen3.5-2B"
      - "--language-model-only"       
      
      - "--gpu-memory-utilization"
      - "${GPU_MEMORY_UTILIZATION}"
      - "--max-model-len"
      - "2048"
      - "--kv-cache-dtype"
      - "fp8"      
      # - "--quantization"
      # - "fp8"

    # Mappage du port pour l'accès à l'API
    expose:
      - "8000"

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS http://127.0.0.1:8000/v1/models >/dev/null
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 10m
      
    # Volume pour la persistance du cache Hugging Face
    volumes:
      - ./huggingface-cache:/root/.cache/huggingface
      
    # Configuration pour l'accès aux GPUs NVIDIA
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

secrets:
  NGINX_SSL_CERT:
    file: ../secrets/NGINX_SSL_CERT
  NGINX_SSL_KEY:
    file: ../secrets/NGINX_SSL_KEY
  NGINX_SSL_FULLCHAIN:
    file: ../secrets/NGINX_SSL_FULLCHAIN
  vllm_api_key:
    file: ./vllm_api_key.txt    

networks:
  app-network:
    name: ${NETWORK_NAME:-vllm-qwen-network-${ENV_NAME:-dev}}
